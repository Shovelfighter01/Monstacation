<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Monstacation ✈️</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;overflow:hidden;background:#F9FAFB;color:#111827}

/* ── AUTH ─────────────────────────────── */
#auth-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1a3a5c 0%,#2d5a3d 100%)}
.auth-card{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.auth-brand-icon{width:44px;height:44px;background:#EFF6FF;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.auth-brand h1{font-size:18px;font-weight:700}
.auth-brand p{font-size:12px;color:#9CA3AF;margin-top:1px}
.tab-row{display:flex;border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;margin-bottom:20px}
.tab{flex:1;padding:8px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#6B7280;font-family:inherit}
.tab.on{background:#111;color:#fff}
.afield{margin-bottom:14px}
.afield label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:5px}
.afield input{width:100%;padding:9px 11px;border:1px solid #D1D5DB;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.afield input:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.auth-btn{width:100%;padding:10px;background:#3B82F6;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.auth-btn:hover{background:#2563EB}
.auth-btn:disabled{opacity:.55;cursor:not-allowed}
.auth-msg{font-size:12px;margin-top:10px;min-height:16px}

/* ── APP SHELL ────────────────────────── */
#app-screen{display:none;flex-direction:column;height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:#fff;border-bottom:1px solid #E5E7EB;flex-shrink:0;gap:10px;flex-wrap:wrap}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:15px;font-weight:700;white-space:nowrap}
.hdr-sub{font-size:11px;color:#9CA3AF;display:block;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.hdr-stat{font-size:12px;color:#6B7280;white-space:nowrap}
.vtoggle{display:flex;border:1px solid #E5E7EB;border-radius:8px;overflow:hidden}
.vbtn{padding:5px 12px;font-size:12px;border:none;background:transparent;cursor:pointer;color:#6B7280;font-family:inherit}
.vbtn.on{background:#111;color:#fff}
.hdr-add{background:#3B82F6;color:#fff;border:none;border-radius:8px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.hdr-add:hover{background:#2563EB}
.hdr-so{background:transparent;border:1px solid #E5E7EB;border-radius:8px;padding:5px 10px;font-size:12px;color:#6B7280;cursor:pointer;font-family:inherit}
main{flex:1;overflow:hidden}

/* ── MAP ──────────────────────────────── */
#map-view{position:relative;height:100%}
#map{height:100%}
#map.pin-mode{cursor:crosshair!important}

/* ── PIN MODE BAR ─────────────────────── */
#pin-bar{display:none;position:absolute;top:12px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:460px;z-index:1001;background:#fff;border-radius:12px;padding:12px 14px 10px;box-shadow:0 4px 24px rgba(0,0,0,.22)}
#pin-bar-title{font-size:13px;font-weight:600;color:#111;margin-bottom:8px}
.pb-search-wrap{position:relative}
#pin-bar-input{width:100%;padding:9px 11px;border:1px solid #D1D5DB;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
#pin-bar-input:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
#pin-bar-res{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #E5E7EB;border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.14);z-index:1002;max-height:210px;overflow-y:auto}
.pb-ri{padding:10px 13px;cursor:pointer;border-bottom:1px solid #F9FAFB;font-size:13px;color:#374151;line-height:1.35}
.pb-ri:last-child{border-bottom:none}
.pb-ri:hover{background:#F9FAFB}
.pb-note{padding:9px 13px;font-size:13px;color:#9CA3AF}
#pin-bar-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
#pin-bar-hint{font-size:12px;color:#9CA3AF}
#pin-bar-cancel{background:none;border:none;color:#6B7280;font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline}

/* ── LIST VIEW ────────────────────────── */
#list-view{height:100%;overflow-y:auto;padding:20px 20px 48px}
.cg{margin-bottom:28px}
.cg-hdr{display:flex;align-items:baseline;gap:8px;margin-bottom:9px}
.cg-name{font-size:15px;font-weight:700}
.cg-cnt{font-size:12px;color:#9CA3AF}
.pl-card{background:#fff;border-radius:12px;border:1px solid #E5E7EB;overflow:hidden}
.pl-row{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer}
.pl-row:hover{background:#F9FAFB}
.pl-row+.pl-row{border-top:1px solid #F3F4F6}
.pl-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.pl-ph{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0}
.pl-inf{flex:1;min-width:0}
.pl-n{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-l{font-size:11px;color:#9CA3AF;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-meta{display:flex;align-items:center;gap:5px;flex-shrink:0}
.pl-tag{font-size:11px;font-weight:500;padding:2px 7px;border-radius:99px}
.empty{text-align:center;padding:64px 20px}
.empty-ico{font-size:52px;margin-bottom:14px}
.empty p{font-size:15px;color:#6B7280}

/* ── OVERLAY ──────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:560px){.overlay{align-items:center}}

/* ── ADD PANEL ────────────────────────── */
#add-panel{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:490px;max-height:78vh;overflow-y:auto;display:flex;flex-direction:column}
@media(min-width:560px){#add-panel{border-radius:16px;max-height:86vh}}
.ph{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 14px;border-bottom:1px solid #F3F4F6;flex-shrink:0}
.ph h2{font-size:16px;font-weight:600}
.ph-close{background:none;border:none;font-size:22px;cursor:pointer;color:#9CA3AF;line-height:1}
.pb{padding:16px 20px 28px}
.pfl{display:block;font-size:12px;font-weight:500;color:#374151;margin:14px 0 5px}
.pfl.first{margin-top:0}
.pfi,.pfi-ro{width:100%;padding:9px 11px;border:1px solid #D1D5DB;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.pfi:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.pfi-ro{color:#9CA3AF;background:#F9FAFB}
select{width:100%;padding:9px 11px;border:1px solid #D1D5DB;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
select:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
textarea.pfi{resize:vertical}
.pf2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.photo-drop{display:block;border:2px dashed #E5E7EB;border-radius:8px;padding:14px;text-align:center;cursor:pointer;color:#9CA3AF;font-size:13px;transition:border-color .15s}
.photo-drop:hover{border-color:#3B82F6;color:#3B82F6}
#photo-prev-wrap{margin-top:8px}
#photo-prev{width:100%;max-height:160px;object-fit:cover;border-radius:8px;display:block}
.rm-photo{font-size:12px;color:#EF4444;background:none;border:none;cursor:pointer;font-family:inherit;margin-top:6px;padding:0}
.save-btn{display:block;width:100%;margin-top:18px;padding:11px;background:#111;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.save-btn:hover{background:#333}
.save-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── DETAIL MODAL ─────────────────────── */
#det-modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
@media(min-width:560px){#det-modal{border-radius:16px}}
.dmh{display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;border-radius:16px 16px 0 0;overflow:hidden}
.dmh-icon-wrap{height:88px;display:flex;align-items:center;justify-content:center;width:100%}
.dmh-photo{width:100%;height:180px;object-fit:cover;display:block}
.dmh-icon{font-size:40px}
.dmh-close{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.25);border:none;border-radius:50%;width:28px;height:28px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;line-height:1;z-index:1}
.dmb{padding:16px 20px 24px}
.dm-name{font-size:20px;font-weight:700;margin-bottom:3px}
.dm-loc{font-size:13px;color:#6B7280;margin-bottom:12px}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px}
.dm-meta{font-size:11px;color:#9CA3AF;margin-bottom:12px}
.dm-web{display:inline-flex;align-items:center;gap:4px;color:#3B82F6;font-size:13px;text-decoration:none;margin-bottom:12px;word-break:break-all}
.dm-web:hover{text-decoration:underline}
.dm-notes{background:#F9FAFB;border-radius:8px;padding:10px 12px;font-size:13px;color:#374151;line-height:1.6;margin-bottom:14px;white-space:pre-wrap}
.dm-acts{display:flex;gap:8px}
.btn-vis{flex:1;padding:10px;border-radius:9px;border:1.5px solid #3B82F6;background:transparent;color:#3B82F6;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-vis.been{border-color:#10B981;background:#ECFDF5;color:#10B981}
.btn-del{padding:10px 14px;border-radius:9px;border:1.5px solid #FECACA;background:transparent;color:#EF4444;font-size:13px;cursor:pointer;font-family:inherit}
.btn-del:hover{background:#FEF2F2}

/* ── LEAFLET POPUP ────────────────────── */
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:0 4px 24px rgba(0,0,0,.15)!important;padding:0!important;overflow:hidden}
.leaflet-popup-content{margin:0!important;width:220px!important}
.lp-photo{width:100%;height:90px;object-fit:cover;display:block}
.lp-inner{padding:10px 13px 12px}
.lp-tags{display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.lp-tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px}
.lp-name{font-weight:700;font-size:14px;color:#111;margin:0 0 2px}
.lp-loc{font-size:12px;color:#6B7280;margin:0 0 9px}
.lp-btn{display:block;width:100%;padding:7px;background:#111;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.lp-btn:hover{background:#333}
</style>
</head>
<body>

<!-- ══════ AUTH ══════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-brand-icon">✈️</div>
      <div><h1>Monstacation</h1><p>Chris &amp; Melissa</p></div>
    </div>
    <div class="tab-row">
      <button class="tab on" id="tab-in" onclick="setAM('in')">Sign in</button>
      <button class="tab" id="tab-up" onclick="setAM('up')">Create account</button>
    </div>
    <div id="name-f" class="afield" style="display:none">
      <label>Your name</label>
      <input type="text" id="a-name" placeholder="Chris or Melissa">
    </div>
    <div class="afield">
      <label>Email</label>
      <input type="email" id="a-email" placeholder="you@email.com">
    </div>
    <div class="afield">
      <label>Password</label>
      <input type="password" id="a-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <button class="auth-btn" id="a-btn" onclick="doAuth()">Sign in</button>
    <div class="auth-msg" id="a-msg"></div>
  </div>
</div>

<!-- ══════ APP ══════ -->
<div id="app-screen">
  <header>
    <div class="hdr-l">
      <span style="font-size:20px">✈️</span>
      <div>
        <span class="hdr-title">Monstacation</span>
        <span class="hdr-sub" id="hdr-sub"></span>
      </div>
    </div>
    <div class="hdr-r">
      <span class="hdr-stat" id="hdr-stat"></span>
      <div class="vtoggle">
        <button class="vbtn on" id="vbtn-map" onclick="setView('map')">🗺 Map</button>
        <button class="vbtn" id="vbtn-list" onclick="setView('list')">☰ List</button>
      </div>
      <button class="hdr-add" onclick="openAdd()">＋ Add place</button>
      <button class="hdr-so" onclick="doSignOut()">Sign out</button>
    </div>
  </header>

  <main>
    <div id="map-view">
      <div id="map"></div>
      <!-- Pin mode search bar -->
      <div id="pin-bar">
        <div id="pin-bar-title">📍 Search for an address or place name</div>
        <div class="pb-search-wrap">
          <input id="pin-bar-input" type="text" placeholder="e.g. 1234 Main St, Austin TX  or  Snow's BBQ Lexington" autocomplete="off" oninput="onPinSearch()">
          <div id="pin-bar-res"></div>
        </div>
        <div id="pin-bar-footer">
          <span id="pin-bar-hint">or click anywhere on the map to drop a pin</span>
          <button id="pin-bar-cancel" onclick="cancelAll()">Cancel</button>
        </div>
      </div>
    </div>
    <div id="list-view" style="display:none"><div id="list-cnt"></div></div>
  </main>

  <!-- ADD FORM OVERLAY -->
  <div class="overlay" id="add-ov" style="display:none" onclick="if(event.target===this)cancelAll()">
    <div id="add-panel">
      <div class="ph">
        <h2 id="add-panel-title">Add a destination</h2>
        <button class="ph-close" onclick="cancelAll()">×</button>
      </div>
      <div class="pb">
        <label class="pfl first">Name *</label>
        <input class="pfi" type="text" id="pd-name" placeholder="What do you call this place?">
        <label class="pfl">Location</label>
        <input class="pfi-ro" type="text" id="pd-loc" readonly>
        <div class="pf2" style="margin-top:14px">
          <div>
            <label class="pfl" style="margin-top:0">Category</label>
            <select id="pd-cat">
              <option value="restaurant">🍽️ Restaurant</option>
              <option value="city">🏙️ City / Area</option>
              <option value="attraction">🎡 Attraction</option>
              <option value="beach">🏖️ Beach</option>
              <option value="mountains">⛰️ Mountains</option>
              <option value="cultural">🏛️ Cultural / Museum</option>
              <option value="nature">🌿 Nature / Park</option>
              <option value="adventure">🧭 Adventure</option>
              <option value="shopping">🛍️ Shopping</option>
              <option value="other">📍 Other</option>
            </select>
          </div>
          <div>
            <label class="pfl" style="margin-top:0">Priority</label>
            <select id="pd-pri">
              <option value="dream">🌟 Dream trip</option>
              <option value="someday" selected>☁️ Someday</option>
              <option value="soon">🚀 Planning soon</option>
            </select>
          </div>
        </div>
        <label class="pfl">Website <span style="font-size:11px;color:#9CA3AF">(optional)</span></label>
        <input class="pfi" type="url" id="pd-web" placeholder="https://…">
        <label class="pfl">Photo <span style="font-size:11px;color:#9CA3AF">(optional)</span></label>
        <label class="photo-drop" id="photo-drop">
          📷 Click to add a photo
          <input type="file" id="pd-photo" accept="image/*" style="display:none" onchange="onPhotoChange()">
        </label>
        <div id="photo-prev-wrap" style="display:none">
          <img id="photo-prev" alt="Photo preview">
          <button class="rm-photo" onclick="clearPhoto()">✕ Remove photo</button>
        </div>
        <label class="pfl">Notes <span style="font-size:11px;color:#9CA3AF">(optional)</span></label>
        <textarea class="pfi" id="pd-notes" rows="3" placeholder="Best dish to order? Best time to visit? Why you want to go?"></textarea>
        <button class="save-btn" id="save-btn" onclick="savePlace()">Add to list</button>
      </div>
    </div>
  </div>

  <!-- DETAIL OVERLAY -->
  <div class="overlay" id="det-ov" style="display:none" onclick="if(event.target===this)closeDet()">
    <div id="det-modal">
      <div class="dmh" id="dmh"></div>
      <div class="dmb" id="dmb"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ╔═══════════════════════════════════╗

// ╚═══════════════════════════════════╝
const SB_URL = 'https://bpysjunhixtvsizfevpw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJweXNqdW5oaXh0dnNpemZldnB3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MjAzNTksImV4cCI6MjA5Nzk5NjM1OX0.jytaRMM2Yb0lGAOKEjPvKqR-P_WlHL1drZEAXRjEtmM';

if (SB_URL === 'YOUR_SUPABASE_URL') {
  document.body.innerHTML = '<div style="font-family:sans-serif;padding:48px;max-width:500px;margin:0 auto"><h2 style="margin-bottom:12px">⚙️ Setup required</h2><p style="color:#6B7280;line-height:1.7">Open <strong>index.html</strong> in a text editor and replace <code style="background:#F3F4F6;padding:1px 5px;border-radius:4px">YOUR_SUPABASE_URL</code> and <code style="background:#F3F4F6;padding:1px 5px;border-radius:4px">YOUR_SUPABASE_ANON_KEY</code> with your Supabase project values.</p></div>';

const CATS = {

  city:      { label:'City / Area',     icon:'🏙️', color:'#3B82F6', bg:'#EFF6FF' },
  attraction:{ label:'Attraction',      icon:'🎡', color:'#EC4899', bg:'#FDF2F8' },
  beach:     { label:'Beach',           icon:'🏖️', color:'#0EA5E9', bg:'#F0F9FF' },

};

  soon:    { label:'Planning soon', color:'#10B981', bg:'#ECFDF5' },
};

let map, places=[], user=null, pinMode=false, draftMarker=null;
let pbTimer=null, pbData=[], pendingGeo=null;
const markers={};

const draftIcon = L.divIcon({
  className:'', iconSize:[18,18], iconAnchor:[9,9],
  html:`<div style="width:18px;height:18px;background:#6B7280;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 10px rgba(0,0,0,.35)"></div>`

// ── AUTH ────────────────────────────────────
let am='in';
function setAM(m){
  am=m;
  document.getElementById('tab-in').classList.toggle('on',m==='in');
  document.getElementById('tab-up').classList.toggle('on',m==='up');
  document.getElementById('a-btn').textContent=m==='in'?'Sign in':'Create account';
  document.getElementById('name-f').style.display=m==='up'?'block':'none';
  amsg('');
}
function amsg(t,c){const e=document.getElementById('a-msg');e.textContent=t;e.style.color=c||'#EF4444';}
async function doAuth(){
  const email=document.getElementById('a-email').value.trim();
  const pwd=document.getElementById('a-pwd').value;
  const name=document.getElementById('a-name').value.trim();
  if(!email||!pwd){amsg('Email and password are required.');return;}
  if(am==='up'&&!name){amsg('Enter your name.');return;}
  const btn=document.getElementById('a-btn');
  btn.disabled=true;btn.textContent='…';amsg('');
  let res;
  if(am==='in'){
    res=await sb.auth.signInWithPassword({email,password:pwd});
  }else{
    res=await sb.auth.signUp({email,password:pwd,options:{data:{full_name:name}}});
  }
  if(res.error){
    amsg(res.error.message);
    btn.disabled=false;btn.textContent=am==='in'?'Sign in':'Create account';
  }else if(am==='up'&&!res.data.session){
    amsg('Check your email to confirm your account, then sign in.','#10B981');
    btn.disabled=false;btn.textContent='Create account';
  }else{
    user=res.data.user;showApp();
  }
}
async function doSignOut(){
  await sb.auth.signOut();user=null;
  document.getElementById('app-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

// ── INIT ────────────────────────────────────
async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user){user=session.user;showApp();}
}
async function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  const name=user.user_metadata?.full_name||user.email.split('@')[0];
  document.getElementById('hdr-sub').textContent='Signed in as '+name;
  initMap();await loadPlaces();
}

// ── MAP ─────────────────────────────────────
function initMap(){
  if(map)return;
  map = L.map('map', { zoomControl: true, worldCopyJump: true }).setView([25, 10], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors',
    maxZoom:19
  }).addTo(map);
  map.on('click',function(e){
    if(!pinMode)return;
    placeDraftPin(e.latlng.lat,e.latlng.lng,null);
  });
}
function pinIcon(color){
  return L.divIcon({
    className:'',iconSize:[16,16],iconAnchor:[8,8],popupAnchor:[0,-12],
    html:`<div style="width:16px;height:16px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.3)"></div>`
  });
}
function mkMarker(p){
  const cat=CATS[p.category]||CATS.other;
  const pri=PRIS[p.priority]||PRIS.someday;
  const color=p.visited?'#10B981':cat.color;
  const photoHtml=p.photo_url
    ?`<img class="lp-photo" src="${esc(p.photo_url)}" alt="">`
    :`<div style="height:6px;background:${cat.bg}"></div>`;
  const m=L.marker([p.lat,p.lng],{icon:pinIcon(color)});
  m.bindPopup(
    photoHtml+
    `<div class="lp-inner">`+
    `<div class="lp-tags">`+
    `<span class="lp-tag" style="color:${cat.color};background:${cat.bg}">${cat.icon} ${cat.label}</span>`+
    `<span class="lp-tag" style="color:${pri.color};background:${pri.bg}">${pri.label}</span>`+
    (p.visited?`<span class="lp-tag" style="color:#10B981;background:#ECFDF5">✓</span>`:'')+
    `</div>`+
    `<p class="lp-name">${esc(p.name)}</p>`+
    `<p class="lp-loc">${esc(p.location||'')}</p>`+
    `<button class="lp-btn" onclick="openDet('${p.id}')">View details →</button>`+
    `</div>`,
    {maxWidth:240}
  ).addTo(map);
  markers[p.id]=m;
}
function rmMarker(id){if(markers[id]){markers[id].remove();delete markers[id];}}
function refreshMarker(p){rmMarker(p.id);if(p.lat&&p.lng)mkMarker(p);}

// ── PLACES ──────────────────────────────────
async function loadPlaces(){
  const{data,error}=await sb.from('places').select('*').order('created_at',{ascending:false});
  if(error){console.error(error);return;}
  places=data||[];
  Object.values(markers).forEach(m=>m.remove());
  Object.keys(markers).forEach(k=>delete markers[k]);
  places.forEach(p=>{if(p.lat&&p.lng)mkMarker(p);});
  updateStat();
  if(document.getElementById('list-view').style.display!=='none')renderList();
}
async function uploadPhoto(file){
  const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  const path=`${user.id}/${Date.now()}.${ext}`;
  const{error}=await sb.storage.from('place-photos').upload(path,file,{contentType:file.type});
  if(error)throw error;
  const{data:{publicUrl}}=sb.storage.from('place-photos').getPublicUrl(path);
  return publicUrl;
}
async function savePlace(){
  if(!pendingGeo)return;
  const name=document.getElementById('pd-name').value.trim();
  if(!name){document.getElementById('pd-name').focus();return;}
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='Saving…';
  let photoUrl=null;
  const photoFile=document.getElementById('pd-photo').files[0];
  if(photoFile){
    btn.textContent='Uploading photo…';
    try{photoUrl=await uploadPhoto(photoFile);}
    catch(e){console.warn('Photo upload failed',e);}
  }
  btn.textContent='Saving…';
  const web=document.getElementById('pd-web').value.trim();
  const{data,error}=await sb.from('places').insert({
    name,location:pendingGeo.display,country:pendingGeo.country,
    lat:pendingGeo.lat,lng:pendingGeo.lng,
    category:document.getElementById('pd-cat').value,
    priority:document.getElementById('pd-pri').value,
    website:(web&&(web.startsWith('http://')||web.startsWith('https://')))?web:null,
    notes:document.getElementById('pd-notes').value.trim()||null,
    photo_url:photoUrl,user_id:user.id,
    added_by:user.user_metadata?.full_name||user.email.split('@')[0],
  }).select().single();
  btn.disabled=false;btn.textContent='Add to list';
  if(error){alert('Save failed: '+error.message);return;}
  places.unshift(data);
  if(draftMarker){draftMarker.remove();draftMarker=null;}
  mkMarker(data);updateStat();
  document.getElementById('add-ov').style.display='none';
  exitPinMode();
  if(data.lat&&data.lng){
    setView('map');
    setTimeout(()=>{map.setView([data.lat,data.lng],14);markers[data.id]?.openPopup();},100);
  }
}
async function toggleVisited(id){
  const p=places.find(x=>x.id===id);if(!p)return;
  const nv=!p.visited;
  const{data,error}=await sb.from('places').update({visited:nv,visited_at:nv?new Date().toISOString():null}).eq('id',id).select().single();
  if(error){console.error(error);return;}
  const i=places.findIndex(x=>x.id===id);places[i]=data;
  refreshMarker(data);updateStat();
  if(document.getElementById('list-view').style.display!=='none')renderList();
  openDet(id);
}
async function deletePlace(id){
  if(!confirm('Remove this place from Monstacation?'))return;
  const{error}=await sb.from('places').delete().eq('id',id);
  if(error){console.error(error);return;}
  rmMarker(id);places=places.filter(x=>x.id!==id);
  updateStat();closeDet();
  if(document.getElementById('list-view').style.display!=='none')renderList();
}

// ── PIN MODE ────────────────────────────────
function openAdd(){
  pinMode=true;
  document.getElementById('map').classList.add('pin-mode');
  document.getElementById('pin-bar').style.display='block';
  document.getElementById('pin-bar-input').value='';
  document.getElementById('pin-bar-res').innerHTML='';
  setView('map');
  setTimeout(()=>document.getElementById('pin-bar-input').focus(),80);
}
function exitPinMode(){
  pinMode=false;
  document.getElementById('map').classList.remove('pin-mode');
  document.getElementById('pin-bar').style.display='none';
  document.getElementById('pin-bar-res').innerHTML='';
}
function cancelAll(){
  exitPinMode();
  document.getElementById('add-ov').style.display='none';
  if(draftMarker){draftMarker.remove();draftMarker=null;}
  pendingGeo=null;
}

// Pin bar search
function onPinSearch(){
  clearTimeout(pbTimer);
  const q=document.getElementById('pin-bar-input').value.trim();
  document.getElementById('pin-bar-res').innerHTML='';
  if(q.length<3)return;
  pbTimer=setTimeout(()=>doPinSearch(q),450);
}
async function doPinSearch(q){
  const res=document.getElementById('pin-bar-res');
  res.innerHTML='<div class="pb-note">Searching…</div>';
  try{
    const r=await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1`,
      {headers:{'Accept-Language':'en'}}
    );
    pbData=await r.json();
    if(!pbData.length){res.innerHTML='<div class="pb-note">No results — try including the city or state</div>';return;}
    res.innerHTML=pbData.map((d,i)=>{
      const parts=d.display_name.split(',').map(s=>s.trim());
      const short=parts.slice(0,Math.min(5,parts.length)).join(', ');
      return`<div class="pb-ri" onclick="pickPinR(${i})">${esc(short)}</div>`;
    }).join('');
  }catch(e){res.innerHTML='<div class="pb-note">Search failed — check your connection</div>';}
}
function pickPinR(i){
  const d=pbData[i];
  document.getElementById('pin-bar-res').innerHTML='';
  placeDraftPin(parseFloat(d.lat),parseFloat(d.lon),d);
}
async function placeDraftPin(lat,lng,nomData){
  if(draftMarker){draftMarker.remove();draftMarker=null;}
  draftMarker=L.marker([lat,lng],{icon:draftIcon}).addTo(map);
  map.setView([lat,lng],Math.max(map.getZoom(),13));
  let display,country;
  if(nomData){
    const parts=nomData.display_name.split(',').map(s=>s.trim());
    display=parts.slice(Math.max(0,parts.length-3)).join(', ');
    country=nomData.address?.country||parts[parts.length-1];
  }else{
    document.getElementById('pin-bar-hint').textContent='Finding address…';
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,{headers:{'Accept-Language':'en'}});
      const d=await r.json();
      const parts=(d.display_name||'').split(',').map(s=>s.trim());
      display=parts.slice(Math.max(0,parts.length-3)).join(', ');
      country=d.address?.country||'';
    }catch(e){
      display=`${lat.toFixed(4)}°, ${lng.toFixed(4)}°`;
      country='';
    }
    document.getElementById('pin-bar-hint').textContent='or click anywhere on the map to drop a pin';
  }
  pendingGeo={lat,lng,display,country};
  document.getElementById('pd-name').value='';
  document.getElementById('pd-loc').value=display;
  document.getElementById('pd-cat').value='restaurant';
  document.getElementById('pd-pri').value='someday';
  document.getElementById('pd-web').value='';
  document.getElementById('pd-notes').value='';
  document.getElementById('pd-photo').value='';
  document.getElementById('photo-prev-wrap').style.display='none';
  document.getElementById('pin-bar').style.display='none';
  document.getElementById('add-ov').style.display='flex';
  setTimeout(()=>document.getElementById('pd-name').focus(),80);
}

// ── PHOTO ───────────────────────────────────
function onPhotoChange(){
  const file=document.getElementById('pd-photo').files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('photo-prev').src=e.target.result;
    document.getElementById('photo-prev-wrap').style.display='block';
  };
  reader.readAsDataURL(file);
}
function clearPhoto(){
  document.getElementById('pd-photo').value='';
  document.getElementById('photo-prev-wrap').style.display='none';
}

// ── DETAIL ──────────────────────────────────
function openDet(id){
  const p=places.find(x=>x.id===id);if(!p)return;
  map?.closePopup();
  const cat=CATS[p.category]||CATS.other;
  const pri=PRIS[p.priority]||PRIS.someday;
  const dmh=document.getElementById('dmh');
  if(p.photo_url){
    dmh.style.background='none';
    dmh.innerHTML=`<img class="dmh-photo" src="${esc(p.photo_url)}" alt="${esc(p.name)}"><button class="dmh-close" onclick="closeDet()">×</button>`;
  }else{
    dmh.style.background=cat.bg;
    dmh.innerHTML=`<div class="dmh-icon-wrap"><span class="dmh-icon">${cat.icon}</span></div><button class="dmh-close" onclick="closeDet()">×</button>`;
  }
  const vis=p.visited?(p.visited_at?`Visited ${new Date(p.visited_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`:' Visited'):null;
  const web=p.website&&(p.website.startsWith('http://')||p.website.startsWith('https://'))
    ?`<a class="dm-web" href="${esc(p.website)}" target="_blank" rel="noopener noreferrer">🔗 ${esc(p.website.replace(/^https?:\/\/(www\.)?/,'').split('/')[0])}</a>`:'';
  document.getElementById('dmb').innerHTML=
    `<p class="dm-name" style="color:${p.visited?'#10B981':'#111'}">${esc(p.name)}</p>`+
    `<p class="dm-loc">${esc(p.location||'')}</p>`+
    `<div class="tags">`+
    `<span class="tag" style="color:${cat.color};background:${cat.bg}">${cat.icon} ${cat.label}</span>`+
    `<span class="tag" style="color:${pri.color};background:${pri.bg}">${pri.label}</span>`+
    (vis?`<span class="tag" style="color:#10B981;background:#ECFDF5">✓ ${vis}</span>`:'')+
    `</div>`+
    (p.added_by?`<p class="dm-meta">👤 Added by ${esc(p.added_by)}</p>`:'')+
    web+
    (p.notes?`<div class="dm-notes">${esc(p.notes)}</div>`:'')+
    `<div class="dm-acts">`+
    `<button class="btn-vis${p.visited?' been':''}" onclick="toggleVisited('${p.id}')">`+
    (p.visited?'✓ Been here!':'📍 Mark as visited')+`</button>`+
    `<button class="btn-del" onclick="deletePlace('${p.id}')">🗑</button>`+
    `</div>`;
  document.getElementById('det-ov').style.display='flex';
}
function closeDet(){document.getElementById('det-ov').style.display='none';}

// ── LIST ────────────────────────────────────
function renderList(){
  const byC={};
  places.forEach(p=>{const k=p.country||'Unknown';if(!byC[k])byC[k]=[];byC[k].push(p);});
  const sorted=Object.entries(byC).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!sorted.length){
    document.getElementById('list-cnt').innerHTML=
      '<div class="empty"><div class="empty-ico">🗺️</div><p>No destinations yet — hit <strong>＋ Add place</strong> to drop your first pin!</p></div>';
    return;
  }
  document.getElementById('list-cnt').innerHTML=sorted.map(([country,cP])=>
    `<div class="cg">`+
    `<div class="cg-hdr"><span class="cg-name">${esc(country)}</span><span class="cg-cnt">${cP.length} place${cP.length!==1?'s':''}</span></div>`+
    `<div class="pl-card">`+
    cP.map(p=>{
      const cat=CATS[p.category]||CATS.other;
      const pri=PRIS[p.priority]||PRIS.someday;
      const thumb=p.photo_url
        ?`<img class="pl-ph" src="${esc(p.photo_url)}" alt="">`
        :`<div class="pl-ico" style="background:${cat.bg}">${cat.icon}</div>`;
      return`<div class="pl-row" onclick="openDet('${p.id}')">`+
        thumb+
        `<div class="pl-inf">`+
        `<p class="pl-n" style="color:${p.visited?'#10B981':'#111'}">${esc(p.name)}</p>`+
        `<p class="pl-l">${esc(p.location||'')}</p>`+
        `</div>`+
        `<div class="pl-meta">`+
        `<span class="pl-tag" style="color:${pri.color};background:${pri.bg}">${pri.label}</span>`+
        (p.visited?`<span class="pl-tag" style="color:#10B981;background:#ECFDF5">✓</span>`:'')+
        `</div></div>`;
    }).join('')+
    `</div></div>`
  ).join('');
}

// ── VIEW / UTILS ────────────────────────────
function setView(v){
  document.getElementById('vbtn-map').classList.toggle('on',v==='map');
  document.getElementById('vbtn-list').classList.toggle('on',v==='list');
  document.getElementById('map-view').style.display=v==='map'?'block':'none';
  document.getElementById('list-view').style.display=v==='list'?'block':'none';
  if(v==='list')renderList();
  if(v==='map')setTimeout(()=>map?.invalidateSize(),50);
}
function updateStat(){
  const w=places.filter(p=>!p.visited).length,v=places.filter(p=>p.visited).length;
  document.getElementById('hdr-stat').textContent=`${w} to visit · ${v} visited`;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
